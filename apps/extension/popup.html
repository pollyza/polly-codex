<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polly</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <section class="header">
        <div class="eyebrow">Polly</div>
        <h1>Turn this page into a spoken briefing</h1>
        <p>Browser-first MVP for Feishu docs and web pages.</p>
      </section>

      <section class="card">
        <div class="usage-row">
          <span>Mode</span>
          <strong id="accountEmail">Trial</strong>
        </div>
      </section>

      <section class="card">
        <label for="provider">Model provider</label>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="gemini" selected>Gemini Flash</option>
        </select>

        <label for="language">Output language</label>
        <select id="language">
          <option value="zh">Chinese</option>
          <option value="en">English</option>
        </select>

        <label for="duration">Target duration</label>
        <select id="duration">
          <option value="3" selected>3 minutes</option>
          <option value="5">5 minutes</option>
          <option value="8">8 minutes</option>
        </select>

        <label for="apiKey">Your API key (optional after trial)</label>
        <input id="apiKey" type="password" placeholder="Paste your OpenAI or Gemini API key" />
      </section>

      <section class="card">
        <div class="usage-row">
          <span>Free runs left</span>
          <strong id="minutesRemaining">-</strong>
        </div>
        <div class="usage-bar"><span></span></div>
      </section>

      <section class="actions">
        <button id="generateButton">Generate podcast</button>
      </section>

      <p id="status" class="status">Ready to capture the current page.</p>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
